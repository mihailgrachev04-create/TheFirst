name: Security Pipeline (DevSecOps)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # 1. Сборка проекта
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build || echo "No build script, skipping"

  # 2. Snyk SCA (сканирование зависимостей)
  snyk-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Snyk SCA Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all

  # 3. Gitleaks Secret Scan (поиск секретов)
  gitleaks-secret-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Filesystem Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            dir /repo --redact --verbose --exit-code 1

  # 4. CodeQL SAST (статический анализ кода)
  codeql-sast:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write   # требуется для загрузки SARIF-отчёта
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
  # 5. DAST (OWASP ZAP)
  zap-dast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start application for DAST testing
        run: |
          npm install
          npm start & 
          echo "Waiting for application to start..."
          sleep 15

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:3000'        # ← измени порт, если у тебя другой
          cmd_options: '-a -r zap-report.html --min-level High'
          allow_fail: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap-report.html
